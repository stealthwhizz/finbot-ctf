<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Error{% endblock %} | FinBot</title>

    <link rel="icon" type="image/x-icon" href="/static/images/common/favicon.ico">

    <!-- Tailwind CSS (Compiled) -->
    <link rel="stylesheet" href="/static/css/tailwind.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="bg-portal-bg text-white font-sans antialiased min-h-screen flex items-center justify-center overflow-hidden">
    {% block background %}
    <div class="absolute inset-0 bg-gradient-to-br from-portal-bg via-portal-bg-alt to-portal-bg"></div>
    {% endblock %}

    <div class="relative z-10 text-center px-6 max-w-4xl mx-auto">
        {% block content %}{% endblock %}
    </div>

    {% block floating_elements %}{% endblock %}
</body>
</html>
