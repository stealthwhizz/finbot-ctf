name: Question
description: Ask a question about the project
labels: ["type: question"]
body:
  - type: markdown
    attributes:
      value: |
        Have a question? Ask away.
  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What would you like to know?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Any relevant background or what you've already tried.
    validations:
      required: false
