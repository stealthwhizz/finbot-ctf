name: Add Migration Label

# Uses pull_request_target so it runs with base repo permissions for forked PRs.
# SECURITY: We do NOT check out or execute PR code. We only use the GitHub API.
on:
  pull_request_target:
    types:
      - opened
      - synchronize

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  add_migration_label:
    runs-on: ubuntu-latest
    steps:
      - name: Check for Migration Files
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.info('No pull_request in context. Skipping.');
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pull_number = pr.number;

            const labelName = 'database migration';
            const labelColor = 'e65100'; // Dark orange
            const labelDescription = 'PR includes Alembic migration files';

            // Get all changed files
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const hasMigration = files.some(f => f.filename.startsWith('alembic/versions/'));
            core.info(`PR #${pull_number}: migration files ${hasMigration ? 'found' : 'not found'}`);

            // Get current labels
            const { data: current } = await github.rest.issues.listLabelsOnIssue({
              owner,
              repo,
              issue_number: pull_number,
              per_page: 100
            });
            const hasLabel = current.some(l => l.name === labelName);

            // Ensure the label exists
            try {
              await github.rest.issues.getLabel({ owner, repo, name: labelName });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: labelName,
                  color: labelColor,
                  description: labelDescription,
                });
                core.info(`Created label "${labelName}"`);
              } else {
                throw e;
              }
            }

            if (hasMigration && !hasLabel) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: pull_number,
                labels: [labelName]
              });
              core.info(`Applied "${labelName}" to PR #${pull_number}`);
            } else if (!hasMigration && hasLabel) {
              try {
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: pull_number,
                  name: labelName
                });
                core.info(`Removed "${labelName}" from PR #${pull_number} (no migration files)`);
              } catch (err) {
                if (err.status !== 404) {
                  core.warning(`Failed to remove label: ${err.message}`);
                }
              }
            } else {
              core.info(`No label change needed for PR #${pull_number}`);
            }
