name: Issue and PR Content Labeler

on:
  issues:
    types: [opened, edited]
  pull_request_target:
    types: [opened, edited]

permissions:
  pull-requests: write
  issues: write

jobs:
  content_labeler:
    runs-on: ubuntu-latest
    steps:
      - name: Apply Content Labels
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            let itemNumber, title, body;
            if (context.payload.pull_request) {
              const pr = context.payload.pull_request;
              itemNumber = pr.number;
              title = pr.title || '';
              body = pr.body || '';
            } else if (context.payload.issue) {
              const issue = context.payload.issue;
              itemNumber = issue.number;
              title = issue.title || '';
              body = issue.body || '';
            } else {
              core.info('No issue or pull_request in context. Skipping.');
              return;
            }

            const text = `${title} ${body}`.toLowerCase();

            // Define keyword-to-label mappings with colors
            const labelRules = [
              { label: 'bug',       color: 'd73a4a', keywords: ['bug', 'crash', 'error', 'fix'] },
              { label: 'security',  color: 'e11d48', keywords: ['security', 'injection', 'csrf', 'attack', 'prompt'] },
              { label: 'ctf',       color: '7c3aed', keywords: ['ctf', 'challenge', 'detector', 'evaluator'] },
              { label: 'agents',    color: '1d4ed8', keywords: ['agent', 'base.py', 'orchestrator'] },
              { label: 'tools',     color: '0891b2', keywords: ['tool', 'vendor', 'invoice'] },
              { label: 'tests',     color: '16a34a', keywords: ['test', 'pytest', 'coverage'] },
              { label: 'frontend',  color: 'f59e0b', keywords: ['frontend', 'ui', 'css', 'sidebar'] },
              { label: 'build',     color: '6b7280', keywords: ['docker', 'ci', 'workflow', 'build'] },
              { label: 'database',  color: '92400e', keywords: ['database', 'migration', 'alembic', 'model'] },
            ];

            // Ensure a label exists, creating it if missing
            async function ensureLabelExists(name, color) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name,
                    color,
                    description: `Auto-applied: content matches "${name}" keywords`,
                  });
                  core.info(`Created label "${name}"`);
                } else {
                  throw e;
                }
              }
            }

            // Get current labels
            const { data: current } = await github.rest.issues.listLabelsOnIssue({
              owner,
              repo,
              issue_number: itemNumber,
              per_page: 100
            });
            const currentNames = new Set(current.map(l => l.name));

            const labelsToAdd = [];

            for (const rule of labelRules) {
              const matched = rule.keywords.some(kw => text.includes(kw));
              if (matched && !currentNames.has(rule.label)) {
                await ensureLabelExists(rule.label, rule.color);
                labelsToAdd.push(rule.label);
                core.info(`Matched label "${rule.label}" for #${itemNumber}`);
              }
            }

            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: itemNumber,
                labels: labelsToAdd
              });
              core.info(`Applied ${labelsToAdd.length} label(s) to #${itemNumber}: ${labelsToAdd.join(', ')}`);
            } else {
              core.info(`No new content labels matched for #${itemNumber}`);
            }
